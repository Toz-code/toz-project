  <meta charset="UTF-8" />

  <meta name="description" content="TOZ Insight 일반 문의, 제휴, 정정 요청 접수 페이지" />
  <meta name="google-adsense-account" content="ca-pub-9788382000229740" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9788382000229740" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">TOZ Insight</div>
      <nav>
        <a href="index.html">홈</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
        <a href="privacy.html">개인정보</a>
        <a href="terms.html">이용약관</a>
      </nav>
      <button id="theme-toggle" type="button">다크 모드</button>
    </header>

    <section class="card doc">
      <p class="doc-meta">운영시간: 평일 10:00~18:00 (KST)</p>
      <h1>문의하기</h1>
      <p class="copy">
        일반 문의, 콘텐츠 정정 요청, 제휴 제안은 아래 폼으로 접수됩니다.
        접수 후 보통 1~2영업일 내 1차 회신을 드립니다.
      </p>

      <form action="https://formspree.io/f/mbdabpjo" method="POST">
        <label for="category">문의 유형</label>
        <select id="category" name="category" required>
          <option value="general">일반 문의</option>
          <option value="correction">정정 요청</option>
          <option value="partnership">제휴 제안</option>
        </select>

        <label for="company">회사명 (선택)</label>
        <input id="company" name="company" type="text" />

        <label for="name">담당자명</label>
        <input id="name" name="name" type="text" required />

        <label for="email">이메일</label>
        <input id="email" name="email" type="email" required />

        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <input type="hidden" name="_subject" value="TOZ Insight 문의" />
        <button type="submit">문의 보내기</button>
      </form>

      <p class="notice">
        본 폼을 통해 제출된 정보는 문의 처리 목적으로만 사용됩니다. 자세한 내용은 개인정보처리방침을 확인해 주세요.
      </p>
    </section>

    <footer class="footer">
      <span>© 2026 TOZ Insight</span>

      <a href="terms.html">이용약관</a>
    </footer>

  <script src="main.js"></script>
