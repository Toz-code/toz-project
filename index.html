<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toz Premium Lotto | 제휴 문의</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <h1>TOZ PREMIUM</h1>
  
  <div class="controls">
    <button id="theme-toggle">Switch Mode</button>
  </div>

  <div class="lotto-container">
    <h2>Lotto Number Generator</h2>
    <div id="lotto-results" class="results-container">
      <span class="placeholder">Unlock your 5 lucky sets of numbers</span>
    </div>
    <button id="generate-lotto">Generate Lucky Numbers</button>
  </div>

  <section class="contact-container">
    <h2>제휴 문의</h2>
    <p class="contact-description">아래 폼으로 내용을 보내주시면 확인 후 연락드리겠습니다.</p>
    <form
      action="https://formspree.io/f/mbdabpjo"
      method="POST"
      class="partner-form"
    >
      <label for="company">회사명</label>
      <input id="company" name="company" type="text" required>

      <label for="name">담당자명</label>
      <input id="name" name="name" type="text" required>

      <label for="email">이메일</label>
      <input id="email" name="email" type="email" required>

      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <input type="hidden" name="_subject" value="TOZ PREMIUM 제휴 문의">
      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>
  </section>

  <script src="main.js"></script>
</body>
</html>
